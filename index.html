<!DOCTYPE html>
<html lang="en">

<head>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hemanth G — Full-Stack Developer & Robotics Engineer</title>
  <meta name="description"
    content="Portfolio of Hemanth G: full-stack developer and robotics engineer building autonomous systems, computer-vision pipelines, and scalable web applications.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-deep: #060912;
      --bg-1: #0a1020;
      --bg-2: #0e1830;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-border-hover: rgba(56, 225, 214, 0.45);
      --cyan: #38e1d6;
      --violet: #7c6cf0;
      --text: #e8eef7;
      --muted: #93a1b8;
      --muted-dim: #5d6b82;
      --radius: 1.25rem;
      --maxw: 70rem;
      --shadow: 0 1.5rem 3.75rem -1.25rem rgba(0, 0, 0, 0.6);

      /* ---- type scale (mandatory, used everywhere) ---- */
      --fs-caption: 0.78rem;
      /* mono labels, dates, tags */
      --fs-eyebrow: 0.82rem;
      /* section + hero eyebrows */
      --fs-small: 0.95rem;
      /* card body / list copy */
      --fs-body: 1rem;
      /* default paragraph */
      --fs-md: 1.06rem;
      /* about lead copy */
      --fs-lead: clamp(1.05rem, 0.9vw + 0.85rem, 1.22rem);
      --fs-h4: 1.12rem;
      /* publication / language titles */
      --fs-h3: clamp(1.2rem, 0.55vw + 1.06rem, 1.34rem);
      /* card titles */
      --fs-h2: clamp(1.85rem, 3vw + 0.9rem, 2.7rem);
      /* section heads */
      --fs-h1: clamp(2.6rem, 5.5vw + 1rem, 5.2rem);
      /* hero */
      --lh-tight: 1.1;
      --lh-snug: 1.3;
      --lh-body: 1.65;

      /* ---- rhythm ---- */
      --section-pad: clamp(3.4rem, 7vw, 5.2rem);
    }

    [data-theme="light"] {
      --bg-deep: #f0f3fa;
      --bg-1: #f3faf9;
      --bg-2: #e0e7ff;
      --glass: rgba(255, 255, 255, 0.72);
      --glass-border: rgba(15, 23, 42, 0.07);
      --glass-border-hover: rgba(124, 108, 240, 0.4);
      --cyan: #0f766e;
      --violet: #4f46e5;
      --text: #0f172a;
      --muted: #475569;
      --muted-dim: #57687e;
      --shadow: 0 10px 30px -10px rgba(15, 23, 42, 0.06), 0 1px 3px rgba(15, 23, 42, 0.02);
    }

    [data-theme="light"] .nav-inner {
      background: rgba(255, 255, 255, 0.75);
      box-shadow: 0 10px 30px -10px rgba(15, 23, 42, 0.05);
      border-color: rgba(15, 23, 42, 0.06);
    }

    [data-theme="light"] .btn-primary:hover {
      box-shadow: 0 0.9rem 2.1rem -0.6rem rgba(15, 118, 110, 0.35);
    }

    [data-theme="light"] .nav-cta:hover {
      background: #0d9488 !important;
      color: #ffffff !important;
    }

    @media(max-width: 820px) {
      [data-theme="light"] .nav-links {
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 15px 35px rgba(15, 23, 42, 0.08);
      }
    }

    [data-theme="light"] .bg-field {
      background:
        radial-gradient(65vw 50vh at 15% 10%, rgba(13, 148, 136, 0.14), transparent 70%),
        radial-gradient(60vw 55vh at 85% 85%, rgba(124, 108, 240, 0.14), transparent 70%),
        linear-gradient(160deg, var(--bg-1), var(--bg-deep) 55%, var(--bg-2));
    }

    [data-theme="light"] #scene {
      opacity: 0.55;
    }

    [data-theme="light"] .about .lead {
      color: var(--text);
    }

    [data-theme="light"] .sep-line {
      background: linear-gradient(90deg, transparent, rgba(15, 23, 42, 0.12), transparent);
    }

    [data-theme="light"] .tag {
      background: rgba(13, 148, 136, 0.06);
      border-color: rgba(13, 148, 136, 0.18);
      color: #0f766e;
    }

    [data-theme="light"] .soft .tag {
      background: rgba(99, 102, 241, 0.06);
      border-color: rgba(99, 102, 241, 0.18);
      color: #4f46e5;
    }

    [data-theme="light"] .proj .cat {
      background: rgba(99, 102, 241, 0.08);
      border-color: rgba(99, 102, 241, 0.22);
      color: #4f46e5;
    }

    [data-theme="light"] .contact-social-pill {
      background: rgba(15, 23, 42, 0.02);
    }

    [data-theme="light"] .contact-field {
      background: rgba(15, 23, 42, 0.04);
      border: 1px solid rgba(15, 23, 42, 0.15);
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      color: var(--text);
    }

    [data-theme="light"] .contact-field:focus {
      border-color: var(--cyan);
      background: rgba(15, 23, 42, 0.01);
      outline: none;
    }

    [data-theme="light"] .contact-label {
      color: var(--text);
      opacity: 0.9;
    }

    [data-theme="light"] .contact-submit-btn:hover {
      box-shadow: 0 0.9rem 2.1rem -0.6rem rgba(15, 118, 110, 0.35);
    }

    [data-theme="light"] .proj::after {
      background: radial-gradient(25rem 12rem at var(--mx, 50%) var(--my, 0%), rgba(99, 102, 241, 0.06), transparent 70%);
    }

    [data-theme="light"] .hl[data-tip]::after {
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(15, 23, 42, 0.1);
      box-shadow: 0 4px 20px rgba(15, 23, 42, 0.08);
    }

    [data-theme="light"] .gallery-badge {
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(15, 23, 42, 0.08);
    }

    /* ---------- THEME TOGGLE BUTTON CSS ---------- */
    .theme-toggle {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      transition: background 0.3s, transform 0.3s;
      flex-shrink: 0;
      margin-left: 0.5rem;
    }

    .theme-toggle:hover {
      background: var(--glass);
      transform: scale(1.05);
    }

    .theme-toggle svg {
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
    }

    [data-theme="dark"] .moon-icon {
      display: none;
    }

    [data-theme="dark"] .sun-icon {
      display: block;
    }

    [data-theme="light"] .moon-icon {
      display: block;
    }

    [data-theme="light"] .sun-icon {
      display: none;
    }

    .theme-toggle:hover svg {
      transform: rotate(30deg);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    /* fluid base — every rem scales with the viewport, so the whole page is %-based */
    html {
      font-size: clamp(15px, 0.5vw + 0.7rem, 18px);
      scroll-behavior: smooth
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      background: var(--bg-deep);
      font-size: var(--fs-body);
      line-height: var(--lh-body);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .bg-field {
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(55vw 40vh at 18% 8%, rgba(56, 225, 214, 0.10), transparent 60%),
        radial-gradient(50vw 48vh at 85% 90%, rgba(124, 108, 240, 0.12), transparent 60%),
        linear-gradient(160deg, var(--bg-1), var(--bg-deep) 55%, var(--bg-2));
    }

    #scene {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.4s ease
    }

    #scene.ready {
      opacity: 1
    }

    .wrap {
      width: 92%;
      max-width: var(--maxw);
      margin-inline: auto
    }

    /* ---------- section separator (clear break between every section) ---------- */
    .sep {
      display: flex;
      justify-content: center
    }

    .sep .wrap {
      display: flex;
      align-items: center;
      gap: 1.1rem
    }

    .sep-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .18), transparent)
    }

    .sep-node {
      flex: 0 0 auto;
      width: 0.55rem;
      height: 0.55rem;
      transform: rotate(45deg);
      border: 1px solid rgba(56, 225, 214, .6);
      box-shadow: 0 0 0.6rem rgba(56, 225, 214, .35)
    }

    /* ---------- HIGHLIGHT (important text) ---------- */
    .hl {
      position: relative;
      display: inline-block;
      cursor: help;
      color: var(--cyan);
      font-weight: 600;
      padding: 0 0.18em;
      border-radius: 0.35em;
      background: rgba(56, 225, 214, 0.10);
      border-bottom: 1px solid rgba(56, 225, 214, 0.40);
      transition: transform .25s ease, background .25s ease, box-shadow .25s ease, color .25s ease;
    }

    .hl:hover,
    .hl:focus-visible {
      transform: scale(1.07);
      outline: none;
      background: rgba(56, 225, 214, 0.22);
      color: #b4f6f0;
      box-shadow: 0 0 1.1rem rgba(56, 225, 214, 0.55);
    }

    .hl.v {
      color: var(--violet);
      background: rgba(124, 108, 240, 0.10);
      border-bottom-color: rgba(124, 108, 240, 0.40)
    }

    .hl.v:hover,
    .hl.v:focus-visible {
      background: rgba(124, 108, 240, 0.22);
      color: #d2ccff;
      box-shadow: 0 0 1.1rem rgba(124, 108, 240, 0.55)
    }

    .hl[data-tip]::after {
      content: attr(data-tip);
      position: absolute;
      bottom: 135%;
      left: 50%;
      transform: translateX(-50%) translateY(0.4rem);
      width: max-content;
      max-width: 14rem;
      white-space: normal;
      text-align: center;
      background: rgba(8, 13, 26, 0.97);
      border: 1px solid var(--glass-border);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.78rem;
      line-height: 1.4;
      padding: 0.5rem 0.75rem;
      border-radius: 0.6rem;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease;
      z-index: 30;
    }

    .hl[data-tip]:hover::after,
    .hl[data-tip]:focus-visible::after {
      opacity: 1;
      transform: translateX(-50%) translateY(0)
    }

    /* ---------- NAV ---------- */
    .nav {
      position: fixed;
      top: 1.1rem;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      justify-content: center;
      padding: 0 1rem
    }

    .nav-inner {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      width: 100%;
      max-width: var(--maxw);
      padding: 0.5rem 0.7rem 0.5rem 1.2rem;
      background: rgba(10, 16, 32, 0.55);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      box-shadow: var(--shadow);
    }

    .brand {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      letter-spacing: -0.02em;
      font-size: 1.02rem;
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 0.5rem
    }

    .brand .dot {
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 0.75rem var(--cyan);
      animation: pulse 2.6s ease-in-out infinite
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .5;
        transform: scale(.8)
      }
    }

    .nav-links {
      display: flex;
      gap: 0.25rem;
      align-items: center
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      transition: .25s
    }

    .nav-links a:hover {
      color: var(--text);
      background: var(--glass)
    }

    .nav-cta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem !important;
      color: var(--bg-deep) !important;
      background: var(--cyan);
      font-weight: 500
    }

    .nav-cta:hover {
      background: #5cf0e5 !important;
      color: var(--bg-deep) !important
    }

    .nav-toggle {
      display: none;
      background: none;
      border: 0;
      color: var(--text);
      cursor: pointer;
      padding: 0.4rem;
      font-size: 1.2rem
    }

    /* ---------- HERO ---------- */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 8.5rem 0 5.5rem
    }

    .hero-inner {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: clamp(2rem, 5vw, 4rem);
      align-items: center;
      width: 100%
    }

    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--fs-eyebrow);
      letter-spacing: .16em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 1.4rem;
      display: inline-flex;
      align-items: center;
      gap: 0.75rem
    }

    .eyebrow::before {
      content: "";
      width: 2.1rem;
      height: 1px;
      background: var(--cyan);
      opacity: .6
    }

    .hero h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: var(--fs-h1);
      font-weight: 700;
      line-height: var(--lh-tight);
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem
    }

    .glow {
      background: linear-gradient(120deg, var(--cyan), var(--violet));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent
    }

    .hero .lede {
      max-width: 38rem;
      font-size: var(--fs-lead);
      color: var(--muted);
      margin-bottom: 2.3rem
    }

    .hero-cta {
      display: flex;
      gap: 0.9rem;
      flex-wrap: wrap;
      align-items: center
    }

    .btn {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      padding: 0.85rem 1.6rem;
      border-radius: 0.85rem;
      transition: .28s;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      cursor: pointer;
      border: 0
    }

    .btn-primary {
      background: var(--cyan);
      color: var(--bg-deep)
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0.9rem 2.1rem -0.6rem rgba(56, 225, 214, .6)
    }

    .btn-ghost {
      background: var(--glass);
      color: var(--text);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px)
    }

    .btn-ghost:hover {
      border-color: var(--glass-border-hover);
      transform: translateY(-2px)
    }

    .hero-stats {
      display: flex;
      gap: clamp(1.5rem, 4vw, 2.5rem);
      flex-wrap: wrap;
      margin-top: 4rem;
      padding-top: 2.1rem;
      border-top: 1px solid var(--glass-border);
      max-width: 40rem
    }

    .stat .num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.6rem, 4vw, 2rem);
      font-weight: 700;
      line-height: 1;
      color: var(--text)
    }

    .stat .lbl {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--fs-caption);
      color: var(--muted-dim);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-top: 0.5rem
    }

    /* hero photo */
    .hero-photo {
      display: flex;
      justify-content: center
    }

    .photo-frame {
      position: relative;
      width: clamp(11rem, 24vw, 16.5rem);
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .photo-frame::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      padding: 2px;
      background: linear-gradient(135deg, var(--cyan), var(--violet));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: .7;
      pointer-events: none
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    /* ---------- generic image placeholder ---------- */
    .ph {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      height: 100%;
      color: var(--muted-dim);
      background: repeating-linear-gradient(45deg, rgba(255, 255, 255, .018) 0 0.8rem, transparent 0.8rem 1.6rem)
    }

    .ph svg {
      width: 2.2rem;
      height: 2.2rem;
      stroke: var(--cyan);
      opacity: .55;
      fill: none;
      stroke-width: 1.6
    }

    .ph span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: .08em;
      text-transform: uppercase
    }

    .photo-frame .ph svg {
      width: 2.8rem;
      height: 2.8rem
    }

    /* ---------- SECTIONS ---------- */
    section {
      padding: var(--section-pad) 0;
      position: relative
    }

    .sec-head {
      margin-bottom: clamp(2rem, 5vw, 3rem)
    }

    .sec-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--fs-eyebrow);
      letter-spacing: .16em;
      color: var(--violet);
      text-transform: uppercase
    }

    .sec-head h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: var(--fs-h2);
      font-weight: 700;
      line-height: var(--lh-snug);
      letter-spacing: -0.02em;
      margin-top: 0.75rem
    }

    .glass {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      backdrop-filter: blur(16px) saturate(130%);
      -webkit-backdrop-filter: blur(16px) saturate(130%);
      box-shadow: var(--shadow)
    }

    /* about */
    .about {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 1.5rem;
      align-items: start
    }

    .about .lead {
      padding: clamp(1.8rem, 4vw, 2.4rem);
      font-size: var(--fs-md);
      color: #c4d0e2
    }

    .about .lead p+p {
      margin-top: 1.1rem
    }

    .quick {
      padding: 1.9rem
    }

    .quick h3 {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--fs-eyebrow);
      color: var(--cyan);
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 1.1rem
    }

    .quick .row {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.7rem 0;
      border-bottom: 1px solid var(--glass-border);
      font-size: var(--fs-small)
    }

    .quick .row:last-child {
      border-bottom: 0
    }

    .quick .row span:first-child {
      color: var(--muted-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--fs-caption)
    }

    .quick .row span:last-child {
      color: var(--text);
      text-align: right
    }

    /* skills */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 17rem), 1fr));
      gap: 1.25rem
    }

    .skill-card {
      padding: 1.75rem;
      transition: .3s
    }

    .skill-card:hover {
      transform: translateY(-4px);
      border-color: var(--glass-border-hover)
    }

    .skill-card .ico {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--fs-caption);
      color: var(--cyan);
      letter-spacing: .08em;
      margin-bottom: 0.9rem;
      text-transform: uppercase
    }

    .skill-card h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: var(--fs-h3);
      line-height: var(--lh-snug);
      margin-bottom: 1rem;
      font-weight: 600
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem
    }

    .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--fs-caption);
      padding: 0.35rem 0.75rem;
      border-radius: 0.5rem;
      background: rgba(56, 225, 214, .07);
      border: 1px solid rgba(56, 225, 214, .18);
      color: #bdeee9
    }

    .soft .tag {
      background: rgba(124, 108, 240, .08);
      border-color: rgba(124, 108, 240, .22);
      color: #cdc6f5
    }

    /* experience */
    .timeline {
      position: relative;
      padding-left: 1.75rem
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 0.3rem;
      top: 0.4rem;
      bottom: 0.4rem;
      width: 1px;
      background: linear-gradient(var(--cyan), var(--violet), transparent)
    }

    .tl-item {
      position: relative;
      padding: 0 0 2.3rem 1.4rem
    }

    .tl-item:last-child {
      padding-bottom: 0
    }

    .tl-item::before {
      content: "";
      position: absolute;
      left: -1.6rem;
      top: 0.4rem;
      width: 0.7rem;
      height: 0.7rem;
      border-radius: 50%;
      background: var(--bg-deep);
      border: 2px solid var(--cyan);
      box-shadow: 0 0 0.6rem var(--cyan)
    }

    .tl-item .when {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--fs-caption);
      color: var(--muted-dim);
      letter-spacing: .05em
    }

    .tl-item h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: var(--fs-h3);
      line-height: var(--lh-snug);
      margin: 0.4rem 0 0.15rem;
      font-weight: 600
    }

    .tl-item .where {
      color: var(--cyan);
      font-size: var(--fs-small);
      margin-bottom: 0.75rem
    }

    .tl-item ul {
      list-style: none;
      color: var(--muted)
    }

    .tl-item li {
      position: relative;
      padding-left: 1.1rem;
      margin-bottom: 0.5rem;
      font-size: var(--fs-small)
    }

    .tl-item li::before {
      content: "▹";
      position: absolute;
      left: 0;
      color: var(--violet)
    }

    /* projects */
    .proj-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 20rem), 1fr));
      gap: 1.4rem
    }

    .proj {
      padding: 0;
      display: flex;
      flex-direction: column;
      transition: .3s;
      position: relative;
      overflow: hidden
    }

    .proj::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      background: radial-gradient(25rem 12rem at var(--mx, 50%) var(--my, 0%), rgba(56, 225, 214, .10), transparent 70%);
      opacity: 0;
      transition: opacity .35s;
      pointer-events: none
    }

    .proj:hover {
      transform: translateY(-5px);
      border-color: var(--glass-border-hover)
    }

    .proj:hover::after {
      opacity: 1
    }

    .proj-img {
      width: 100%;
      aspect-ratio: 16/9;
      border-bottom: 1px solid var(--glass-border);
      overflow: hidden
    }

    .proj-img img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .proj-body {
      padding: 1.7rem;
      display: flex;
      flex-direction: column;
      flex-grow: 1
    }

    .proj .ptop {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.9rem
    }

    .proj .cat {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--fs-caption);
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 0.3rem 0.65rem;
      border-radius: 0.45rem;
      background: rgba(124, 108, 240, .12);
      color: #cdc6f5;
      border: 1px solid rgba(124, 108, 240, .25)
    }

    .proj .pdate {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--fs-caption);
      color: var(--muted-dim);
      white-space: nowrap
    }

    .proj h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: var(--fs-h3);
      font-weight: 600;
      margin-bottom: 0.75rem;
      line-height: var(--lh-snug)
    }

    .proj p {
      color: var(--muted);
      font-size: var(--fs-small);
      flex-grow: 1
    }

    .proj .pstack {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-top: 1.1rem
    }

    .proj .pstack span {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--fs-caption);
      color: var(--cyan);
      padding: 0.25rem 0.55rem;
      border-radius: 0.4rem;
      background: rgba(56, 225, 214, .06);
      border: 1px solid rgba(56, 225, 214, .15)
    }

    /* publications */
    .pubs {
      display: grid;
      gap: 1.1rem
    }

    .pub {
      padding: 1.6rem 1.9rem;
      display: flex;
      gap: 1.4rem;
      align-items: flex-start;
      transition: .3s
    }

    .pub:hover {
      border-color: var(--glass-border-hover)
    }

    .pub .pmark {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--violet);
      line-height: 1
    }

    .pub h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: var(--fs-h4);
      line-height: var(--lh-snug);
      font-weight: 600;
      margin-bottom: 0.4rem
    }

    .pub .status {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--fs-caption);
      color: var(--cyan);
      display: inline-block;
      margin-bottom: 0.65rem;
      padding: 0.2rem 0.65rem;
      border-radius: 0.4rem;
      background: rgba(56, 225, 214, .08);
      border: 1px solid rgba(56, 225, 214, .18)
    }

    .pub p {
      color: var(--muted);
      font-size: var(--fs-small)
    }

    /* achievements */
    .ach-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 20rem), 1fr));
      gap: 1.1rem
    }

    .ach {
      padding: 1.5rem 1.6rem;
      transition: .3s;
      display: flex;
      gap: 1.1rem;
      align-items: flex-start
    }

    .ach:hover {
      transform: translateY(-3px);
      border-color: var(--glass-border-hover)
    }

    .ach .achdate {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--fs-caption);
      color: var(--muted-dim);
      white-space: nowrap
    }

    .ach h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: var(--fs-h4);
      line-height: var(--lh-snug);
      font-weight: 600;
      margin-bottom: 0.3rem
    }

    .ach .org {
      color: var(--cyan);
      font-size: var(--fs-small);
      margin-bottom: 0.4rem
    }

    .ach p {
      color: var(--muted);
      font-size: var(--fs-small)
    }

    .ach .medal {
      font-size: 1.4rem;
      line-height: 1
    }

    /* languages */
    .langs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 11rem), 1fr));
      gap: 1.1rem
    }

    .lang {
      padding: 1.5rem;
      text-align: center;
      transition: .3s
    }

    .lang:hover {
      transform: translateY(-3px);
      border-color: var(--glass-border-hover)
    }

    .lang .lname {
      font-family: 'Space Grotesk', sans-serif;
      font-size: var(--fs-h4);
      font-weight: 600;
      margin-bottom: 0.4rem
    }

    .lang .level {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--fs-caption);
      color: var(--cyan)
    }

    .lang .bar {
      height: 0.35rem;
      border-radius: 0.2rem;
      background: rgba(255, 255, 255, .08);
      margin-top: 0.9rem;
      overflow: hidden
    }

    .lang .bar i {
      display: block;
      height: 100%;
      border-radius: 0.2rem;
      background: linear-gradient(90deg, var(--cyan), var(--violet))
    }

    /* contact */
    .contact {
      text-align: center;
      padding: clamp(5rem, 10vw, 7rem) 0 clamp(3.5rem, 8vw, 5.8rem)
    }

    .contact h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.1rem, 6vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -.02em;
      margin-bottom: 1.1rem
    }

    .contact p {
      color: var(--muted);
      max-width: 32rem;
      margin: 0 auto 2.2rem;
      font-size: var(--fs-lead)
    }

    .contact-links {
      display: flex;
      gap: 0.9rem;
      justify-content: center;
      flex-wrap: wrap
    }

    .clink {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--fs-small);
      color: var(--text);
      text-decoration: none;
      padding: 0.8rem 1.35rem;
      border-radius: 0.75rem;
      transition: .28s;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px)
    }

    .clink:hover {
      border-color: var(--glass-border-hover);
      transform: translateY(-2px);
      color: var(--cyan)
    }

    footer {
      text-align: center;
      padding: 2.5rem 0 3rem;
      color: var(--muted-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--fs-caption);
      border-top: 1px solid var(--glass-border)
    }

    .reveal {
      opacity: 0;
      transform: translateY(1.8rem);
      transition: opacity .8s ease, transform .8s ease
    }

    .reveal.in {
      opacity: 1;
      transform: none
    }

    /* ---------- GALLERY LIGHTBOX MODAL ---------- */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(4, 6, 12, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .lightbox.active {
      opacity: 1;
      pointer-events: all;
    }

    .lightbox-close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      color: var(--text);
      font-size: 1.7rem;
      width: 3.2rem;
      height: 3.2rem;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s ease;
      z-index: 110;
    }

    .lightbox-close:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--cyan);
      color: var(--cyan);
      transform: rotate(90deg) scale(1.05);
      box-shadow: 0 0 1rem rgba(56, 225, 214, 0.3);
    }

    .lightbox-content {
      position: relative;
      width: 90%;
      max-width: 58rem;
      aspect-ratio: 16/10;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--bg-1);
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow);
      transform: scale(0.95);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .lightbox.active .lightbox-content {
      transform: scale(1);
    }

    .lightbox-img-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .lightbox-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      opacity: 0;
      transform: scale(0.98);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .lightbox-img.loaded {
      opacity: 1;
      transform: scale(1);
    }

    /* Nav Buttons */
    .lightbox-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(10, 16, 32, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      color: var(--text);
      width: 3.5rem;
      height: 3.5rem;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      transition: all 0.25s ease;
      z-index: 105;
    }

    .lightbox-btn:hover {
      background: rgba(56, 225, 214, 0.15);
      border-color: var(--cyan);
      color: var(--cyan);
      box-shadow: 0 0 1rem rgba(56, 225, 214, 0.3);
    }

    .lightbox-btn:active {
      transform: translateY(-50%) scale(0.92);
    }

    .lightbox-prev {
      left: 1.5rem;
    }

    .lightbox-next {
      right: 1.5rem;
    }

    /* Footer Info */
    .lightbox-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.2rem 2rem;
      background: linear-gradient(to top, rgba(6, 9, 18, 0.95), rgba(6, 9, 18, 0.7) 60%, transparent);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(255, 255, 255, 0.03);
    }

    .lightbox-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
    }

    .lightbox-counter {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--cyan);
      background: rgba(56, 225, 214, 0.08);
      padding: 0.3rem 0.75rem;
      border-radius: 0.5rem;
      border: 1px solid rgba(56, 225, 214, 0.2);
    }

    /* Thumbnails Indicator */
    .lightbox-thumbs {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 1.5rem;
      max-width: 90%;
      overflow-x: auto;
      padding: 0.5rem;
      scrollbar-width: thin;
      scrollbar-color: var(--glass-border) transparent;
    }

    .lightbox-thumb {
      width: 4rem;
      aspect-ratio: 16/10;
      border-radius: 0.35rem;
      border: 2px solid transparent;
      overflow: hidden;
      cursor: pointer;
      opacity: 0.4;
      transition: all 0.25s ease;
      flex-shrink: 0;
    }

    .lightbox-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .lightbox-thumb:hover {
      opacity: 0.8;
    }

    .lightbox-thumb.active {
      opacity: 1;
      border-color: var(--cyan);
      transform: scale(1.05);
      box-shadow: 0 0 0.8rem rgba(56, 225, 214, 0.35);
    }

    /* Indicator/Badge on card showing there's a gallery */
    .gallery-badge {
      position: absolute;
      top: 0.8rem;
      right: 0.8rem;
      background: rgba(10, 16, 32, 0.75);
      backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      color: var(--cyan);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      font-weight: 500;
      padding: 0.3rem 0.6rem;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      pointer-events: none;
      z-index: 10;
      box-shadow: var(--shadow);
      transition: all 0.25s ease;
    }

    .proj:hover .gallery-badge {
      border-color: var(--cyan);
      box-shadow: 0 0 0.8rem rgba(56, 225, 214, 0.25);
    }

    /* responsive */
    @media(max-width:820px) {
      .hero-inner {
        grid-template-columns: 1fr;
        text-align: center
      }

      .hero-photo {
        order: -1;
        margin-bottom: 1.5rem
      }

      .eyebrow,
      .hero-cta,
      .hero-stats {
        justify-content: center
      }

      .hero .lede {
        margin-inline: auto
      }

      .hero-stats {
        margin-inline: auto
      }

      .about {
        grid-template-columns: 1fr
      }

      .nav-links {
        display: none;
        position: absolute;
        top: 3.8rem;
        right: 1rem;
        left: 1rem;
        flex-direction: column;
        align-items: stretch;
        padding: 0.9rem;
        background: rgba(10, 16, 32, .94);
        backdrop-filter: blur(18px);
        border: 1px solid var(--glass-border);
        border-radius: 1.1rem
      }

      .nav-links.open {
        display: flex
      }

      .nav-toggle {
        display: block
      }
    }

    @media(prefers-reduced-motion:reduce) {
      * {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto
      }

      .reveal {
        opacity: 1;
        transform: none
      }
    }

    /* ---------- CONTACT SECTION OVERHAUL ---------- */
    .contact-grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 3.5rem;
      margin-top: 3rem;
      text-align: left;
    }

    @media(max-width: 820px) {
      .contact-grid {
        grid-template-columns: 1fr;
        gap: 2.5rem;
      }
    }

    .contact-form-side {
      display: flex;
      flex-direction: column;
      gap: 2.2rem;
    }

    .contact-input-group {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .contact-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 500;
    }

    .contact-field {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--glass-border);
      padding: 0.75rem 0;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-bottom-color 0.25s ease;
    }

    .contact-field:focus {
      border-bottom-color: var(--cyan);
    }

    textarea.contact-field {
      resize: none;
      min-height: 5.5rem;
    }

    .contact-submit-btn {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      background: var(--cyan);
      color: var(--bg-deep);
      padding: 0.85rem 2rem;
      border-radius: 0.85rem;
      border: none;
      cursor: pointer;
      width: max-content;
      transition: all 0.28s ease;
      margin-top: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .contact-submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0.9rem 2.1rem -0.6rem rgba(56, 225, 214, 0.6);
    }

    .quick-links-box {
      padding: 2.2rem;
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
    }

    .quick-links-box h3 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: var(--cyan);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .quick-link-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      text-decoration: none;
      color: inherit;
    }

    .quick-link-icon {
      width: 2.75rem;
      height: 2.75rem;
      border-radius: 0.75rem;
      background: rgba(56, 225, 214, 0.05);
      border: 1px solid rgba(56, 225, 214, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--cyan);
      flex-shrink: 0;
      transition: all 0.25s ease;
    }

    .quick-link-item:hover .quick-link-icon {
      background: rgba(56, 225, 214, 0.12);
      border-color: var(--cyan);
      box-shadow: 0 0 0.8rem rgba(56, 225, 214, 0.25);
    }

    .quick-link-details {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .quick-link-lbl {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .quick-link-val {
      font-size: 0.92rem;
      color: var(--text);
      font-weight: 500;
      word-break: break-all;
    }

    .contact-social-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }

    .contact-social-pill {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.1rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      color: var(--text);
      text-decoration: none;
      font-size: 0.8rem;
      font-family: 'JetBrains Mono', monospace;
      transition: all 0.25s ease;
    }

    .contact-social-pill:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      background: rgba(56, 225, 214, 0.08);
      box-shadow: 0 0 0.8rem rgba(56, 225, 214, 0.15);
    }

    /* ---------- CERT & ACH IMAGE CARDS ---------- */
    .cert-card {
      cursor: pointer;
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .cert-card:hover {
      transform: translateY(-5px);
      border-color: var(--glass-border-hover);
      box-shadow: 0 1.2rem 2.8rem -0.8rem rgba(124, 108, 240, 0.25);
    }

    .cert-img {
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
      border-radius: calc(var(--radius) - 2px) calc(var(--radius) - 2px) 0 0;
      background: var(--bg-2);
      flex-shrink: 0;
    }

    .cert-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.45s ease;
      display: block;
    }

    .cert-card:hover .cert-img img {
      transform: scale(1.07);
    }

    .cert-body {
      padding: 1.25rem 1.5rem 1.4rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 0.75rem;
    }

    /* ---------- ACH CARD WITH PHOTO ---------- */
    .ach-card {
      display: flex;
      gap: 1.1rem;
      align-items: flex-start;
      cursor: pointer;
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      overflow: hidden;
      padding: 1.35rem 1.5rem;
    }

    .ach-card:hover {
      transform: translateY(-4px);
      border-color: var(--glass-border-hover);
      box-shadow: 0 1rem 2.5rem -0.7rem rgba(56, 225, 214, 0.2);
    }

    .ach-thumb {

      min-width: 5.5rem;
      aspect-ratio: 1;
      border-radius: 0.75rem;
      overflow: hidden;
      background: var(--bg-2);
      flex-shrink: 0;

      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.45s ease;
      display: block;
    }

    }

      display: flex;

      gap: 0.25rem;

    }

      cursor: default;
    }

    .ach-no-img:hover {
      transform: none;
      box-shadow: var(--shadow);
      border-color: var(--glass-border);
    }

    /* --- Moving Skills Marquee --- */
    .skills-marquee-section {
      width: 100%;
      overflow: hidden;
      padding: 1rem 0;
      position: relative;
      margin-bottom: 2.5rem;
    }
    
    .marquee-container {
      position: relative;
      overflow: hidden;
      width: 100%;
      display: flex;
      padding: 0.5rem 0;
    }
    
    /* Subtle fade gradient on edges */
    .marquee-container::before,
    .marquee-container::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 150px;
      z-index: 5;
      pointer-events: none;
    }
    
    .marquee-container::before {
      left: 0;
      background: linear-gradient(to right, var(--bg-deep), transparent);
    }
    
    .marquee-container::after {
      right: 0;
      background: linear-gradient(to left, var(--bg-deep), transparent);
    }
    
    .marquee-track {
      display: flex;
      gap: 1.5rem;
      width: max-content;
      will-change: transform;
    }
    
    .scroll-left-track {
      animation: scroll-left 32s linear infinite;
    }
    
    .scroll-right-track {
      animation: scroll-right 32s linear infinite;
    }
    
    /* Pause animation on hover */
    .marquee-track:hover {
      animation-play-state: paused;
    }
    
    .tech-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 1.35rem;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: default;
      white-space: nowrap !important;
      flex-shrink: 0 !important;
    }
    
    .tech-pill:hover {
      transform: translateY(-2px) scale(1.05);
      border-color: var(--glass-border-hover);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 20px rgba(56, 225, 214, 0.25);
    }
    
    [data-theme="light"] .tech-pill:hover {
      background: rgba(124, 108, 240, 0.06);
      box-shadow: 0 0 20px rgba(124, 108, 240, 0.15);
    }
    
    .tech-pill img,
    .tech-pill svg {
      width: 24px;
      height: 24px;
      object-fit: contain;
      transition: transform 0.3s ease;
      display: block;
    }
    
    .tech-pill:hover img,
    .tech-pill:hover svg {
      transform: scale(1.15) rotate(5deg);
    }
    
    .tech-pill span {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--fs-small);
      font-weight: 500;
      color: var(--text);
      white-space: nowrap !important;
      flex-shrink: 0 !important;
    }
    
    @keyframes scroll-left {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(-50%);
      }
    }
    
    @keyframes scroll-right {
      0% {
        transform: translateX(-50%);
      }
      100% {
        transform: translateX(0);
      }
    }
  </style>
</head>

    function wireUp() {
      const navToggle = document.getElementById('navToggle');

      navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => navLinks.classList.remove('open')));

      const io = new IntersectionObserver((es) => {
        es.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
      }, { threshold: 0.12 });
      document.querySelectorAll('.reveal').forEach(el => io.observe(el));

      document.querySelectorAll('.proj').forEach(card => {
        card.addEventListener('mousemove', e => {
          const r = card.getBoundingClientRect();
          card.style.setProperty('--mx', ((e.clientX - r.left) / r.width * 100) + '%');
          card.style.setProperty('--my', ((e.clientY - r.top) / r.height * 100) + '%');
        });
      });

      // Lightbox Gallery handlers
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxClose = document.getElementById('lightboxClose');
      const lightboxPrev = document.getElementById('lightboxPrev');
      const lightboxNext = document.getElementById('lightboxNext');
      const lightboxTitle = document.getElementById('lightboxTitle');
      const lightboxCounter = document.getElementById('lightboxCounter');
      const lightboxThumbs = document.getElementById('lightboxThumbs');

      let currentProjIdx = -1;
      let currentImgIdx = 0;
      let activeImages = [];
      let singleImageTitle = '';

      function openLightbox(projIdx) {
        const proj = DATA.projects[projIdx];
        activeImages = proj.images || (proj.image ? [proj.image] : []);
        if (activeImages.length === 0) return;

        currentProjIdx = projIdx;
        currentImgIdx = 0;
        lightbox.classList.add('active');
        lightbox.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';

        if (activeImages.length > 1) {
          lightboxThumbs.innerHTML = activeImages.map((img, i) => `
            <div class="lightbox-thumb ${i === 0 ? 'active' : ''}" data-thumb-idx="${i}">
              <img src="${img}" alt="Thumbnail ${i + 1}">
            </div>
          `).join('');
          lightboxThumbs.style.display = 'flex';

          lightboxThumbs.querySelectorAll('.lightbox-thumb').forEach(thumb => {
            thumb.addEventListener('click', () => {
              const idx = parseInt(thumb.getAttribute('data-thumb-idx'), 10);
              showImage(idx);
            });
          });
        } else {
          lightboxThumbs.innerHTML = '';
          lightboxThumbs.style.display = 'none';
        }

        if (activeImages.length > 1) {
          lightboxPrev.style.display = 'flex';
          lightboxNext.style.display = 'flex';
        } else {
          lightboxPrev.style.display = 'none';
          lightboxNext.style.display = 'none';
        }

        showImage(0);
      }

      function openSingleImage(src, title) {
        activeImages = [src];
        currentProjIdx = -1;
        currentImgIdx = 0;
        singleImageTitle = title;
        lightbox.classList.add('active');
        lightbox.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';

        lightboxThumbs.innerHTML = '';
        lightboxThumbs.style.display = 'none';
        lightboxPrev.style.display = 'none';
        lightboxNext.style.display = 'none';

        showImage(0);
      }

      function showImage(idx) {
        if (idx < 0) idx = activeImages.length - 1;
        if (idx >= activeImages.length) idx = 0;

        currentImgIdx = idx;
        lightboxImg.classList.remove('loaded');

        setTimeout(() => {
          lightboxImg.src = activeImages[currentImgIdx];
          if (currentProjIdx !== -1 && DATA.projects[currentProjIdx]) {
            lightboxTitle.textContent = `${DATA.projects[currentProjIdx].title} — ${DATA.projects[currentProjIdx].cat}`;
          } else {
            lightboxTitle.textContent = singleImageTitle;
          }
          lightboxCounter.textContent = `${currentImgIdx + 1} / ${activeImages.length}`;

          const thumbs = lightboxThumbs.querySelectorAll('.lightbox-thumb');
          thumbs.forEach((thumb, i) => {
            if (i === currentImgIdx) {
              thumb.classList.add('active');
              thumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            } else {
              thumb.classList.remove('active');
            }
          });
        }, 150);
      }

      lightboxImg.addEventListener('load', () => {
        lightboxImg.classList.add('loaded');
      });

      function closeLightbox() {
        lightbox.classList.remove('active');
        lightbox.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
        setTimeout(() => {
          lightboxImg.src = '';
        }, 350);
      }

      document.querySelectorAll('.proj').forEach(card => {
        card.addEventListener('click', () => {
          const projIdx = parseInt(card.getAttribute('data-proj-index'), 10);
          openLightbox(projIdx);
        });
      });

      // Certification card click → lightbox
      document.querySelectorAll('.cert-card').forEach(card => {
        const img = card.getAttribute('data-cert-img');
        const title = card.getAttribute('data-cert-title');
        if (img) {
          card.addEventListener('click', () => openSingleImage(img, title));
        } else {
          card.style.cursor = 'default';
        }
      });

      // Achievement card click → lightbox
      document.querySelectorAll('.ach-card').forEach(card => {
        const img = card.getAttribute('data-ach-img');
        const title = card.getAttribute('data-ach-title');
        if (img) {
          card.addEventListener('click', () => openSingleImage(img, title));
        } else {
          card.style.cursor = 'default';
        }
      });

      lightboxPrev.addEventListener('click', (e) => {
        e.stopPropagation();
        showImage(currentImgIdx - 1);
      });

      lightboxNext.addEventListener('click', (e) => {
        e.stopPropagation();
        showImage(currentImgIdx + 1);
      });

      lightboxClose.addEventListener('click', closeLightbox);

      lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox || e.target.classList.contains('lightbox-img-wrapper')) {
          closeLightbox();
        }
      });

      document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'ArrowLeft') {
          showImage(currentImgIdx - 1);
        } else if (e.key === 'ArrowRight') {
          showImage(currentImgIdx + 1);
        } else if (e.key === 'Escape') {
          closeLightbox();
        }
      });

      // make highlights keyboard-focusable so the tooltip works without a mouse
      document.querySelectorAll('.hl').forEach(el => el.setAttribute('tabindex', '0'));

      // Theme toggler click listener
      const themeToggle = document.getElementById('themeToggle');
      if (themeToggle) {
        themeToggle.addEventListener('click', () => {
          const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
          const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', newTheme);
          localStorage.setItem('theme', newTheme);
          updateSceneColors();
        });
      }
    }

    function updateSceneColors() {
      if (!lineMat || !pointMat || !fieldMat) return;
      const theme = document.documentElement.getAttribute('data-theme') || 'dark';
      if (theme === 'light') {
        lineMat.color.set('#0ea5e9');  // sky-500
        pointMat.color.set('#4f46e5'); // indigo-600
        fieldMat.color.set('#0284c7'); // sky-700
        lineMat.opacity = 0.35;
        fieldMat.opacity = 0.6;
      } else {
        lineMat.color.set('#38e1d6');  // cyan
        pointMat.color.set('#7c6cf0'); // violet
        fieldMat.color.set('#6fd8e8'); // light cyan-blue
        lineMat.opacity = 0.28;
        fieldMat.opacity = 0.5;
      }
    }

    /* ---------- 3D node-network scene ---------- */
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    function init3D() {
      if (typeof THREE === 'undefined') return;
      const canvas = document.getElementById('scene');
      let w = window.innerWidth, h = window.innerHeight;
      const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); renderer.setSize(w, h);
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(60, w / h, 0.1, 100); camera.position.z = 6;
      const group = new THREE.Group(); scene.add(group);
      const geo = new THREE.IcosahedronGeometry(2.1, 2);

      lineMat = new THREE.LineBasicMaterial({ color: 0x38e1d6, transparent: true, opacity: 0.28 });
      pointMat = new THREE.PointsMaterial({ color: 0x7c6cf0, size: 0.07, transparent: true, opacity: 0.9 });
      fieldMat = new THREE.PointsMaterial({ color: 0x6fd8e8, size: 0.035, transparent: true, opacity: 0.5 });

      group.add(new THREE.LineSegments(new THREE.WireframeGeometry(geo), lineMat));
      group.add(new THREE.Points(geo, pointMat));

      const N = 420, pg = new THREE.BufferGeometry(), pos = new Float32Array(N * 3);
      for (let i = 0; i < N * 3; i++)pos[i] = (Math.random() - 0.5) * 22;
      pg.setAttribute('position', new THREE.BufferAttribute(pos, 3));

      const field = new THREE.Points(pg, fieldMat); scene.add(field);

      let mx = 0, my = 0, tx = 0, ty = 0;
      window.addEventListener('mousemove', e => { mx = e.clientX / w - 0.5; my = e.clientY / h - 0.5; });
      window.addEventListener('resize', () => { w = window.innerWidth; h = window.innerHeight; camera.aspect = w / h; camera.updateProjectionMatrix(); renderer.setSize(w, h); });
      const clock = new THREE.Clock();
      function animate() {
        const t = clock.getElapsedTime();
        group.rotation.y += 0.0016; group.rotation.x = Math.sin(t * 0.25) * 0.18; field.rotation.y -= 0.0006;
        tx += (mx - tx) * 0.05; ty += (my - ty) * 0.05;
        group.rotation.y += tx * 0.01; group.position.x = tx * 0.6; group.position.y = -ty * 0.6;
        const s = 1 + Math.sin(t * 0.8) * 0.02; group.scale.set(s, s, s);
        renderer.render(scene, camera);
        if (!reduceMotion) requestAnimationFrame(animate);
      }

      updateSceneColors();

      requestAnimationFrame(() => canvas.classList.add('ready'));
      reduceMotion ? renderer.render(scene, camera) : animate();
    }

    /* ---------- boot ---------- */
    render();
    wireUp();
    init3D();
  </script>
</body>

</html>
